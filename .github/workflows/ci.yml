name: CI
on:
  push:
    branches: [r5-recovery, main]
  pull_request:
    branches: [r5-recovery, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - run: npx vitest run
      - run: npx playwright install --with-deps
      - run: npx playwright test
